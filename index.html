<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="クルーバス">
  <meta name="theme-color" content="#0f172a">
  <title>USJ クルーバス時刻表</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='30' fill='%230f172a'/><text x='90' y='125' font-size='90' text-anchor='middle' fill='white'>🚌</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 設定ボタン（右上固定） -->
    <button id="settingsBtn" class="settings-top-right" aria-label="設定">⚙️</button>

    <!-- 1. 現在のバス停名（最上部） -->
    <section id="currentStopSection" class="section">
      <div class="current-stop-display" id="currentStopDisplay">
        <span class="stop-name-text">停留所を選択</span>
      </div>
      <div class="gps-info" id="gpsInfo"></div>
    </section>

    <!-- 2. 次のバス情報 -->
    <section id="nextBusSection" class="section">
      <div class="next-bus-card" id="nextBusCard">
        <div class="next-bus-label">次のバス</div>
        <div class="next-bus-countdown" id="nextBusCountdown">--:--</div>
        <div class="next-bus-time" id="nextBusTime">停留所を選択してください</div>
        <div class="next-bus-direction" id="nextBusDirection"></div>
      </div>
    </section>

    <!-- 3. 方向選択ボタン（大きく） -->
    <section id="directionSection" class="section">
      <div class="direction-buttons" id="directionButtons"></div>
    </section>

    <!-- 4. 現在時刻（小さく表示、タップで閉園時間変更） -->
    <section id="timeSection" class="section">
      <div class="time-row" id="timeRow">
        <div class="current-time-small" id="currentTime">--:--:--</div>
        <div class="mode-badge" id="modeBadge">18時閉園</div>
      </div>
      <!-- 閉園時間変更ポップアップ -->
      <div class="closing-mode-popup hidden" id="closingModePopup">
        <div class="popup-title">閉園時間を選択</div>
        <div class="closing-mode-options">
          <button class="closing-opt" data-mode="18">18時</button>
          <button class="closing-opt" data-mode="19">19時</button>
          <button class="closing-opt" data-mode="20">20時</button>
          <button class="closing-opt" data-mode="21">21時</button>
          <button class="closing-opt" data-mode="22">22時</button>
        </div>
        <div class="after830-section">
          <button class="after830-btn" id="after830Btn" aria-label="8時30分以降オープン">8時30分以降オープン</button>
        </div>
        <div class="park-hours-section">
          <a href="https://parkinfo-sp.usj.co.jp/schedule/realtime/realtime_index2.html" target="_blank" rel="noopener" class="park-hours-btn">📋 営業時間を確認</a>
        </div>
      </div>
    </section>

    <!-- 5. バス停手動選択 -->
    <section id="stopSelector" class="section">
      <div class="section-header">
        <span class="section-title">🚏 バス停を選択</span>
        <div class="section-header-actions">
          <button id="favFilterBtn" class="filter-btn" aria-label="お気に入りフィルター">⭐</button>
          <button id="gpsBtn" class="gps-btn" aria-label="GPS取得">📡</button>
        </div>
      </div>
      <div class="route-tabs">
        <button class="route-tab south-tab active" data-route="south">SOUTH</button>
        <button class="route-tab north-tab" data-route="north">NORTH</button>
      </div>
      <div class="stop-list" id="stopList"></div>
    </section>

    <!-- 次便一覧（直近3つ） -->
    <section id="upcomingSection" class="section">
      <div class="section-title">📋 次の便一覧</div>
      <div class="upcoming-list" id="upcomingList"></div>
    </section>

    <!-- 全時刻表表示 -->
    <section id="fullTimetable" class="section">
      <button class="toggle-timetable" id="toggleTimetableBtn">全時刻表を表示</button>
      <div class="timetable-full hidden" id="timetableFull"></div>
    </section>

    <!-- 設定画面 -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <h2>⚙️ 設定</h2>
        <button id="closeSettings" class="icon-btn">✕</button>
      </div>
      <div class="settings-content">
        <div class="setting-group">
          <label>GPS機能</label>
          <label class="switch">
            <input type="checkbox" id="gpsToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-group">
          <label>発車3分前通知</label>
          <label class="switch">
            <input type="checkbox" id="notificationToggle">
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-group">
          <label>お気に入り登録</label>
          <div class="fav-register-form" id="favRegisterForm">
            <div class="fav-form-row">
              <select id="favRouteSelect">
                <option value="north">NORTH</option>
                <option value="south">SOUTH</option>
              </select>
              <select id="favStopSelect"></select>
            </div>
            <div class="fav-form-row">
              <select id="favDirSelect">
                <option value="toDeck">デッキ行き</option>
                <option value="toCS">CS棟行き</option>
              </select>
              <button id="addFavBtn" class="action-btn primary">追加</button>
            </div>
          </div>
          <div id="favoritesList" class="favorites-list"></div>
        </div>
        <div class="setting-group">
          <label>🚫 運休時間設定</label>
          <p class="setting-desc">始発停留所の時刻をタップすると、その便の全停留所が運休になります</p>
          <div class="suspend-form">
            <div class="suspend-form-row">
              <select id="suspendRouteSelect">
                <option value="north">NORTH</option>
                <option value="south">SOUTH</option>
              </select>
              <select id="suspendDirSelect">
                <option value="toDeck">デッキ行き</option>
                <option value="toCS">CS棟行き</option>
              </select>
            </div>
          </div>
          <div id="suspendTimesList" class="suspend-times-list"></div>
        </div>
        <div class="setting-group">
          <label>座標データ管理</label>
          <button id="exportDataBtn" class="action-btn">エクスポート</button>
          <button id="importDataBtn" class="action-btn">インポート</button>
          <input type="file" id="importFileInput" accept=".json" class="hidden">
        </div>
        <div class="setting-group">
          <label>座標登録モード</label>
          <button id="coordRegisterBtn" class="action-btn">座標登録</button>
        </div>
        <div class="setting-group">
          <label>デバッグ情報</label>
          <label class="switch">
            <input type="checkbox" id="debugToggle">
            <span class="slider"></span>
          </label>
          <div id="debugInfo" class="debug-info hidden"></div>
        </div>
      </div>
    </div>

    <!-- 座標登録モーダル（パスワード不要） -->
    <div id="coordModal" class="modal hidden">
      <div class="modal-content">
        <h3>📍 座標登録</h3>
        <p>現在地のGPS座標を停留所に登録します</p>
        <select id="coordStopSelect"></select>
        <button id="registerCurrentCoord" class="action-btn primary">現在地を登録</button>
        <div id="coordResult"></div>
        <div class="modal-actions">
          <button id="closeCoordModal" class="action-btn secondary">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
